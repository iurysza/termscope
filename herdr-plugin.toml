id = "termscope"
name = "Herdr File Picker"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Visible-screen file and link picker for Herdr."
platforms = ["linux", "macos", "windows"]

[[actions]]
id = "open"
title = "Open visible file picker"
contexts = ["workspace"]
command = ["python3", "termscope.py", "--open-pane"]

[[actions]]
id = "open-links"
title = "Open visible link picker"
contexts = ["workspace"]
command = ["python3", "termscope.py", "--open-links-pane"]

[[panes]]
id = "picker"
title = "File Picker"
placement = "overlay"
command = ["python3", "termscope.py"]

[[panes]]
id = "link-picker"
title = "Link Picker"
placement = "overlay"
command = ["python3", "termscope.py", "--links"]
