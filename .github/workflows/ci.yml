name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CI-only TOML parser
        if: matrix.python-version == '3.10'
        run: python -m pip install tomli

      - name: Compile scripts
        run: python -m py_compile termscope termscope_herdr.py

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Validate Herdr manifest
        run: |
          python - <<'PY'
          try:
              import tomllib
          except ModuleNotFoundError:
              import tomli as tomllib
          from pathlib import Path

          manifest = tomllib.loads(Path('herdr-plugin.toml').read_text())
          assert manifest['id'] == 'termscope'
          assert manifest['min_herdr_version'] >= '0.7.0'
          assert set(manifest['platforms']) == {'linux', 'macos'}
          assert {a['id'] for a in manifest['actions']} == {'open', 'open-links'}
          assert {p['id'] for p in manifest['panes']} == {'picker', 'link-picker'}
          PY
